services:

  samba:
    build:
      context: ./samba
      dockerfile: Dockerfile
    container_name: samba-server
    # แนะนำให้ตั้ง hostname ให้ตรงกับ NetBIOS name ใน smb.conf เพื่อไม่ให้ Kerberos สับสน
    hostname: SMB-67070109
    networks:
      - smb-network
    # === บรรทัดสำคัญ: ชี้ไปที่ IP ของเครื่อง DNS/AD Controller ของคณะ ===
    dns:
      - 161.246.38.141
      - 10.70.37.141  # <<< เปลี่ยนเป็น IP ของ AD DNS Server จริงของคุณ
    ports:
      - "1137:137/udp"
      - "1138:138/udp"
      - "1139:139/tcp"
      - "445:445/tcp"
    volumes:
      # แนะนำให้ bind mount ไฟล์คอนฟิกตรงๆ จากโฟลเดอร์ จะได้แก้ไขบน Host ได้สะดวก
      - ./samba/smb.conf.template:/smb.conf.template
      - ./samba/krb5.conf:/etc/krb5.conf
      # ใช้ Named Volume เก็บเฉพาะข้อมูลภายในและไฟล์กุญแจลับ (Keytab) ไม่ให้หายเวลารีสตาร์ท
      - samba-data:/var/lib/samba
      - ./data/shared:/mnt/shared
      # (เอาบรรทัด /var/run/samba/winbindd ออก เพื่อให้คอนเทนเนอร์รัน Winbind แยกอิสระ)
    environment:
      - WORKGROUP=IT
    healthcheck:
      test: ["CMD-SHELL", "pidof smbd > /dev/null && echo ok || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: smb-webapp
    networks:
      - smb-network
    ports:
      - "8080:8080"
    volumes:
      - samba-data:/var/lib/samba
      - ./data/shared:/mnt/shared
      - /var/run/docker.sock:/var/run/docker.sock
      - ./webapp:/app
    environment:
      - SAMBA_CONTAINER=samba-server
      - SAMBA_DATA_PATH=/var/lib/samba
      - API_HOST=0.0.0.0
      - API_PORT=8080
    depends_on:
      samba:
        condition: service_healthy
    restart: unless-stopped

networks:
  smb-network:
    driver: bridge

volumes:
  samba-data:
